<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pagyra HTML to PDF Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="vendor/codemirror/darcula.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link id="ckeditor-css" rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/41.4.2/ckeditor5.css"
    media="none" />
</head>

<body>
  <div class="app-shell">
    <header class="app-bar">
      <strong class="app-bar-title">Pagyra Playground</strong>
      <div class="app-bar-controls">
        <label class="control-group">
          <span>Template</span>
          <select id="example-select"></select>
        </label>
        <label class="control-group">
          <span>W</span>
          <input id="viewport-width" type="number" min="200" value="800" />
        </label>
        <label class="control-group">
          <span>H</span>
          <input id="viewport-height" type="number" min="200" value="1120" />
        </label>
        <label class="control-group control-toggle">
          <input type="checkbox" id="ckeditor-toggle" />
          <span>Rich text</span>
        </label>
        <div id="status-shell" class="status-chip" data-tone="neutral">
          <span class="status-dot" aria-hidden="true"></span>
          <p id="status" role="status">Ready to render.</p>
        </div>
        <button id="render-btn" type="button">
          <span class="button-label">Convert to PDF</span>
          <span class="button-subtle">Generate a fresh document</span>
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-panel panel">
        <div class="tab-container">
          <div class="tab-buttons" role="tablist" aria-label="Editor tabs">
            <button class="tab-button active" data-tab="html" role="tab" aria-selected="true">HTML</button>
            <button class="tab-button" data-tab="css" role="tab" aria-selected="false">CSS</button>
            <button class="tab-button" data-tab="header" role="tab" aria-selected="false">Header</button>
            <button class="tab-button" data-tab="footer" role="tab" aria-selected="false">Footer</button>
          </div>
          <div class="tab-content">
            <div class="tab-pane active" id="editor-html-tab" aria-hidden="false">
              <div class="editor-section">
                <textarea id="html-input" spellcheck="false"></textarea>
              </div>
            </div>
            <div class="tab-pane" id="editor-css-tab" aria-hidden="true">
              <div class="editor-section">
                <textarea id="css-input" spellcheck="false"></textarea>
              </div>
            </div>
            <div class="tab-pane" id="editor-header-tab" aria-hidden="true">
              <div class="editor-section">
                <textarea id="header-input" spellcheck="false" placeholder="Header HTML (optional)"></textarea>
              </div>
            </div>
            <div class="tab-pane" id="editor-footer-tab" aria-hidden="true">
              <div class="editor-section">
                <textarea id="footer-input" spellcheck="false" placeholder="Footer HTML (optional)"></textarea>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="preview-panel panel">
        <div class="tab-container">
          <div class="tab-buttons" role="tablist" aria-label="Preview tabs">
            <button class="tab-button active" data-tab="pdf" role="tab" aria-selected="true">PDF</button>
            <button class="tab-button" data-tab="html" role="tab" aria-selected="false">HTML</button>
          </div>
          <div class="tab-content">
            <div class="tab-pane active" id="preview-pdf-tab" aria-hidden="false">
              <div class="preview-frame preview-frame-pdf">
                <object id="pdf-viewer" data="" type="application/pdf" aria-label="PDF preview"></object>
                <div class="preview-empty" id="pdf-empty-state">
                  <strong>No PDF yet</strong>
                  <span>Click "Convert to PDF" to render.</span>
                </div>
              </div>
            </div>
            <div class="tab-pane" id="preview-html-tab" aria-hidden="true">
              <div class="preview-frame preview-frame-html">
                <iframe id="html-viewer" sandbox="allow-same-origin allow-scripts" aria-label="HTML preview"></iframe>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <details class="debug-panel">
      <summary>Diagnostics</summary>
      <div class="debug-controls">
        <div class="debug-grid">
          <div class="debug-card">
            <label class="field">
              <span>Log Level</span>
              <select id="log-level">
                <option value="trace">Trace</option>
                <option value="debug">Debug</option>
                <option value="info" selected>Info</option>
                <option value="warn">Warning</option>
                <option value="error">Error</option>
              </select>
            </label>
          </div>
          <div class="debug-card debug-card-wide">
            <div class="debug-card-header">
              <span>Categories</span>
              <div class="debug-button-group">
                <button id="log-select-all" type="button">All</button>
                <button id="log-select-none" type="button">None</button>
              </div>
            </div>
            <div class="checkbox-grid" id="debug-categories-container"></div>
          </div>
        </div>
      </div>
    </details>
  </div>

  <script src="vendor/codemirror/codemirror.min.js"></script>
  <script src="vendor/codemirror/xml.min.js"></script>
  <script src="vendor/codemirror/javascript.min.js"></script>
  <script src="vendor/codemirror/css.min.js"></script>
  <script src="vendor/codemirror/htmlmixed.min.js"></script>
  <script id="ckeditor-script" src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
  <script src="mode.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
